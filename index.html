<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('themeMode');
          if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0ea5e9" />

    <!-- Primary Meta Tags -->
    <title>%VITE_APP_TITLE% - %VITE_APP_TAGLINE%</title>
    <meta name="title" content="%VITE_APP_TITLE% - %VITE_APP_TAGLINE%" />
    <meta name="description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="author" content="%VITE_APP_TITLE%" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_APP_URL%/" />
    <meta property="og:title" content="%VITE_APP_TITLE% - %VITE_APP_TAGLINE%" />
    <meta property="og:description" content="%VITE_APP_DESCRIPTION%" />
    <meta property="og:image" content="%VITE_APP_URL%/og-image.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="%VITE_APP_URL%/" />
    <meta property="twitter:title" content="%VITE_APP_TITLE% - %VITE_APP_TAGLINE%" />
    <meta property="twitter:description" content="%VITE_APP_DESCRIPTION%" />
    <meta property="twitter:image" content="%VITE_APP_URL%/og-image.svg" />

    <!-- Canonical URL -->
    <link rel="canonical" href="%VITE_APP_URL%/" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "%VITE_APP_TITLE%",
        "url": "%VITE_APP_URL%/",
        "description": "%VITE_APP_DESCRIPTION%",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "All"
      }
    </script>

    <!-- Vite injects scripts here -->
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
